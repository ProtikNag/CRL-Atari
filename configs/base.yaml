# =============================================================================
# Base Configuration for CRL-Atari
# =============================================================================

# --- Seed & Reproducibility ---
seed: 42

# --- Task Sequence ---
# Union action space is computed at runtime from the minimal action sets
# of all games below. For {Pong, Breakout, SpaceInvaders} the union is
# [NOOP, FIRE, RIGHT, LEFT, RIGHTFIRE, LEFTFIRE] = 6 actions.
# Task ordering matters for HTCL: task-0 is used to initialize the global
# model and only receives Fisher protection (no Taylor update toward it)
# on pass 0.  Placing Pong last ensures it gets a corrective Taylor update
# rather than being silently overwritten by later tasks.
task_sequence:
  - BreakoutNoFrameskip-v4
  - SpaceInvadersNoFrameskip-v4
  - PongNoFrameskip-v4

# --- DQN Model ---
model:
  # CNN backbone
  conv_channels: [32, 64, 64]
  conv_kernels: [8, 4, 3]
  conv_strides: [4, 2, 1]
  # Fully connected head
  fc_hidden: 512
  # unified_action_dim is computed at runtime from the union of all games'
  # minimal action sets. Do NOT hardcode it here.
  dueling: false

# --- Training (Expert) ---
training:
  total_timesteps: 3_000_000
  learning_rate: 1.0e-4
  batch_size: 32
  gamma: 0.99
  # Replay buffer
  buffer_size: 500_000
  min_buffer_size: 50_000
  # Exploration (linear decay over first 500K steps ≈ 17% of training)
  eps_start: 1.0
  eps_end: 0.01
  eps_decay_steps: 500_000
  # Target network
  target_update_freq: 2500
  # Double DQN (use policy net to select, target net to evaluate)
  double_dqn: true
  # Training frequency
  train_freq: 4
  gradient_clip: 10.0
  # Checkpointing
  save_freq: 250_000
  eval_freq: 50_000
  eval_episodes: 10

# --- Q-Value Normalization (PopArt) ---
# PopArt rescales the output layer weights when running target statistics
# change, preserving un-normalized predictions during training.
# NOTE: Disabled for expert training. PopArt continuously rescales the
# output layer weights, which corrupts Adam's running moment estimates
# and prevents single-task DQN from learning.  Re-enable only for
# multi-task consolidation where reward scales genuinely differ.
normalization:
  enabled: false
  method: "popart"
  momentum: 0.01

# --- Atari Environment Wrappers ---
env:
  frame_stack: 4
  frame_skip: 4
  screen_size: 84
  # noop_max: number of random NOOPs on reset. 30 is the DeepMind standard,
  # providing sufficient initial-state diversity without wasting frames.
  noop_max: 30
  episodic_life: true
  clip_reward: true
  grayscale: true

# --- Consolidation (shared) ---
consolidation:
  # Each expert starts from random initialization (no global-to-local init).

# --- Consolidation Replay Buffer ---
# Shared raw buffer size collected per expert (used by both methods).
# High-confidence states are filtered from this pool for Fisher / gradient.
buffer_size_per_task: 100_000

# --- Knowledge Distillation ---
distillation:
  temperature: 2.0
  alpha: 0.5  # weight of distillation loss vs task loss
  distill_epochs: 50
  distill_lr: 5.0e-5
  distill_batch_size: 64

# --- HTCL ---
htcl:
  # Number of high-confidence states kept for Fisher / gradient computation.
  # States are ranked by Q-value gap (max_Q - min_Q over valid actions);
  # only the top-K most decisive states are retained.
  filtered_buffer_size: 50_000
  fisher_samples: 5000
  # Lambda candidates for per-lambda consolidation (legacy grid search).
  lambda_candidates: [0.1, 1.0, 10.0, 100.0, 1000.0]
  # Default lambda used as fallback.
  lambda_htcl: 100.0
  lambda_auto: false
  lambda_margin: 0.1  # Safety margin above -mu_min(H)
  eta: 0.9            # Taylor update step size
  diagonal_fisher: true
  # Multi-pass: iterate over all tasks this many times so cumulative Fisher
  # accumulates protection for earlier tasks across passes.
  num_passes: 3
  # Joint refinement: after multi-pass, compute Fisher & gradient over ALL
  # tasks jointly and apply one final Taylor update toward mean expert.
  joint_refinement: true

# --- One-Shot Joint Consolidation (Section 3, Theorem 3.4) ---
# All experts considered simultaneously at the ensemble-mean anchor.
# Single closed-form Taylor correction; no step size (Eq. 12).
oneshot:
  lambda_htcl: 100.0       # fallback if game not in lambda_per_task
  lambda_per_task:
    Breakout: 100.0
    SpaceInvaders: 100.0
    Pong: 500.0
  fisher_samples: 20000
  filtered_buffer_size: 50_000

# --- Multi-Round Iterative Consolidation (Section 4, Algorithm 1) ---
# Each round: averaged Fisher/gradient over all experts jointly, single
# combined Taylor update.  Step size decays as eta_0 * gamma^k.
iterative:
  lambda_htcl: 100.0       # fallback if game not in lambda_per_task
  lambda_per_task:
    Breakout: 100.0
    SpaceInvaders: 100.0
    Pong: 500.0
  eta: 0.9            # eta_0 (initial step size)
  gamma: 0.9          # step-size decay per round (slower for K=10)
  num_rounds: 10       # K rounds
  fisher_samples: 20000
  filtered_buffer_size: 50_000
  recompute_fisher: false  # compute Fisher once, take K steps with cached F

# --- Hybrid Consolidation (Section 5, Algorithm 2) ---
# Phase 1: Multi-round joint Taylor consolidation (Algorithm 1).
# Phase 2: KD refinement (Theorem 5.2 warm-start advantage).
hybrid:
  # Phase 1 (Joint Taylor) settings
  lambda_htcl: 100.0       # fallback if game not in lambda_per_task
  lambda_per_task:
    Breakout: 100.0
    SpaceInvaders: 100.0
    Pong: 500.0
  eta: 0.9            # eta_0
  gamma: 0.9          # step-size decay per round (slower for K=10)
  num_rounds: 10       # K rounds
  recompute_fisher: false  # compute Fisher once, take K steps with cached F
  # Phase 2 (KD refinement) settings — must match distillation for fair comparison
  kd_epochs: 50
  kd_lr: 5.0e-5
  temperature: 2.0
  kd_batch_size: 64

# --- Evaluation ---
evaluation:
  episodes: 30
  deterministic: true
  render: false
  record_video: false

# --- Logging ---
logging:
  log_dir: "results/logs"
  checkpoint_dir: "results/checkpoints"
  figure_dir: "results/figures"
  use_tensorboard: true
  use_wandb: false
  wandb_project: "crl-atari"
  wandb_entity: null
  log_interval: 1000

# --- Debug Mode ---
debug:
  enabled: false
  total_timesteps: 10000
  buffer_size: 2000
  min_buffer_size: 500
  eval_episodes: 2
  eval_freq: 2000
  save_freq: 5000
  # Consolidation debug overrides
  buffer_size_per_task: 2000
  filtered_buffer_size: 500
  fisher_samples: 100
  distill_epochs: 5
  lambda_candidates: [1.0, 100.0]
  # Hybrid KD refinement debug override
  hybrid_kd_epochs: 3
