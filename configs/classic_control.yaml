# =============================================================================
# Configuration for CRL Classic Control Environments
# =============================================================================
# Drop-in replacement for base.yaml when running on CartPole, Acrobot,
# and LunarLander instead of Atari.  Key differences:
#   - No image preprocessing (frame stack, grayscale, resize).
#   - State inputs are low-dimensional float vectors, zero-padded to
#     max_state_dim so a single MLP handles all three tasks.
#   - Union action space computed at runtime (max = 4 for LunarLander).
#   - MLP backbone instead of CNN.

# --- Seed & Reproducibility ---
seed: 42

# --- Dataset Identifier ---
dataset: classic_control

# --- Task Sequence ---
# State dims: CartPole=4, Acrobot=6, LunarLander=8.
# Union action space computed at runtime (CartPole=2, Acrobot=3, LunarLander=4).
task_sequence:
  - CartPole-v1
  - Acrobot-v1
  - LunarLander-v3

# --- State Space ---
# All observations are zero-padded to max_state_dim before entering the MLP.
max_state_dim: 8

# --- MLP Model (replaces CNN-based DQN) ---
model:
  type: mlp
  hidden_dims: [128, 128]
  # unified_action_dim computed at runtime from union of per-task action spaces.
  dueling: false

# --- Training (Expert) ---
training:
  total_timesteps: 50_000
  learning_rate: 1.0e-3
  batch_size: 64
  gamma: 0.99
  # Replay buffer
  buffer_size: 10_000
  min_buffer_size: 500
  # Exploration
  eps_start: 1.0
  eps_end: 0.01
  eps_decay_steps: 10_000
  # Target network
  target_update_freq: 500
  # Double DQN
  double_dqn: true
  # Training frequency
  train_freq: 1
  gradient_clip: 10.0
  # Checkpointing
  save_freq: 25_000
  eval_freq: 5_000
  eval_episodes: 20

# --- Q-Value Normalization ---
normalization:
  enabled: false
  method: "popart"
  momentum: 0.01

# --- Environment ---
# No wrappers needed for classic control; Gymnasium handles everything.
env: {}

# --- Consolidation (shared) ---
consolidation: {}

# --- Consolidation Replay Buffer ---
buffer_size_per_task: 5_000

# --- Knowledge Distillation ---
distillation:
  temperature: 1.0
  alpha: 0.5
  distill_epochs: 500
  distill_lr: 1.0e-3
  distill_batch_size: 128

# --- HTCL ---
htcl:
  filtered_buffer_size: 5_000
  fisher_samples: 2_000
  lambda_candidates: [0.1, 1.0, 10.0, 100.0]
  lambda_htcl: 10.0
  lambda_auto: false
  lambda_margin: 0.1
  eta: 0.9
  diagonal_fisher: true
  num_passes: 3
  joint_refinement: true

# --- One-Shot Joint Consolidation ---
oneshot:
  lambda_htcl: 10.0
  lambda_per_task:
    CartPole: 10.0
    Acrobot: 10.0
    LunarLander: 10.0
  fisher_samples: 5_000
  filtered_buffer_size: 5_000

# --- Multi-Round Iterative Consolidation ---
iterative:
  lambda_htcl: 10.0
  lambda_per_task:
    CartPole: 10.0
    Acrobot: 10.0
    LunarLander: 10.0
  eta: 0.9
  gamma: 0.9
  num_rounds: 5
  fisher_samples: 5_000
  filtered_buffer_size: 5_000
  recompute_fisher: false

# --- Hybrid Consolidation ---
hybrid:
  lambda_htcl: 10.0
  lambda_per_task:
    CartPole: 10.0
    Acrobot: 10.0
    LunarLander: 10.0
  eta: 0.9
  gamma: 0.9
  num_rounds: 5
  recompute_fisher: false
  kd_epochs: 250
  kd_lr: 5.0e-4
  temperature: 1.0
  kd_batch_size: 128

# --- EWC Baseline ---
ewc:
  lambda: 1_000.0
  fisher_samples: 2_000
  buffer_size_per_task: 5_000
  gamma_ewc: 0.95

# --- WHC (Weighted Hessian Consolidation) ---
whc:
  lambda_reg: 0.01
  fisher_samples: 5_000

# --- Progress & Compress ---
progress_compress:
  progress_steps: 50_000
  compress_epochs: 500
  compress_lr: 1.0e-3
  compress_batch_size: 128
  temperature: 1.0
  lambda_ewc: 1_000.0
  gamma_ewc: 0.95
  fisher_samples: 2_000
  buffer_size_per_task: 5_000

# --- TRAC (Trainable Recurrent Attention for Continual learning) ---
trac:
  beta_grid: [0.9, 0.99, 0.999, 0.9999]
  epsilon: 1.0e-8

# --- C-CHAIN (Churn-Controlled Heuristic for Atari INterplay) ---
cchain:
  churn_coeff: 0.1
  ref_batch_size: 64

# --- Multi-Task Joint Training Baseline ---
multitask:
  total_timesteps: 100_000

# --- Evaluation ---
evaluation:
  episodes: 30
  deterministic: true
  render: false
  record_video: false

# --- Logging ---
logging:
  log_dir: "results_classic_control/logs"
  checkpoint_dir: "results_classic_control/checkpoints"
  figure_dir: "results_classic_control/figures"
  use_tensorboard: true
  use_wandb: false
  wandb_project: "crl-classic-control"
  wandb_entity: null
  log_interval: 500

# --- Debug Mode ---
debug:
  enabled: false
  total_timesteps: 5_000
  buffer_size: 500
  min_buffer_size: 200
  eval_episodes: 2
  eval_freq: 1_000
  save_freq: 2_500
  # Consolidation debug overrides
  buffer_size_per_task: 500
  filtered_buffer_size: 200
  fisher_samples: 50
  distill_epochs: 5
  lambda_candidates: [1.0, 10.0]
  # Hybrid KD refinement debug override
  hybrid_kd_epochs: 3
  # Multi-task debug override
  multitask_total_timesteps: 5_000
  # Progress & Compress debug overrides
  pc_progress_steps: 5_000
  pc_compress_epochs: 5
